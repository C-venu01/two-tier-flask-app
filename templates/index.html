<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Tier Flask App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .badge {
            text-align: center;
            margin-bottom: 20px;
        }
        .badge span {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
        }
        form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #5a6fd6; }
        .messages {
            list-style: none;
        }
        .messages li {
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
            font-size: 15px;
            color: #444;
        }
        .empty {
            text-align: center;
            color: #aaa;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge"><span>DevOps CI/CD Pipeline Demo</span></div>
        <h1>Two-Tier Flask App</h1>
        <form action="/submit" method="POST" id="msgForm">
            <input type="text" name="message" placeholder="Enter a message..." required>
            <button type="submit">Submit</button>
        </form>
        <ul class="messages">
            {% if messages %}
                {% for msg in messages %}
                    <li><strong>#{{ msg[0] }}</strong> — {{ msg[1] }}</li>
                {% endfor %}
            {% else %}
                <li class="empty">No messages yet. Submit one above!</li>
            {% endif %}
        </ul>
    </div>

    <script>
        document.getElementById('msgForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('/submit', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        location.reload();
                    }
                })
                .catch(err => console.error(err));
        });
    </script>
</body>
</html>
